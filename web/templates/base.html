<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>{% block title %}云南行{% endblock %}</title>
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
body{-webkit-tap-highlight-color:transparent}
.tab-active{border-bottom:2px solid #3b82f6;color:#3b82f6;font-weight:600}
</style>
{% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 text-sm max-w-screen-sm mx-auto min-h-screen pb-16">
{% block body %}{% endblock %}

<!-- bottom nav -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 text-xs max-w-screen-sm mx-auto">
<a href="/" class="flex flex-col items-center {% if active=='home' %}text-blue-500{% else %}text-gray-500{% endif %}">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
<span>总览</span></a>
<a href="/route" class="flex flex-col items-center {% if active=='route' %}text-blue-500{% else %}text-gray-500{% endif %}">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
<span>路线</span></a>
<a href="/budget" class="flex flex-col items-center {% if active=='budget' %}text-blue-500{% else %}text-gray-500{% endif %}">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
<span>预算</span></a>
<a href="/phase5" class="flex flex-col items-center {% if active=='phase5' %}text-blue-500{% else %}text-gray-500{% endif %}">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7 4h10a2 2 0 012 2v14l-7-3-7 3V6a2 2 0 012-2z"/></svg>
<span>阶段5</span></a>
<a href="/food" class="flex flex-col items-center {% if active=='food' %}text-blue-500{% else %}text-gray-500{% endif %}">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2a6 6 0 016 6c0 4.5-6 14-6 14S6 12.5 6 8a6 6 0 016-6z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v4l3 1.5"/></svg>
<span>饮食</span></a>
<a href="/gear" class="flex flex-col items-center {% if active=='gear' %}text-blue-500{% else %}text-gray-500{% endif %}">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
<span>装备</span></a>
</nav>
</body>
</html>
