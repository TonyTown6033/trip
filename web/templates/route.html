{% extends "base.html" %}
{% set active = "route" %}
{% block title %}云南行 - 路线{% endblock %}
{% block head %}
<script src="https://webapi.amap.com/loader.js"></script>
<style>
.stage-marker{width:24px;height:24px;border-radius:50%;background:#3b82f6;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.stage-label{background:#fff;padding:2px 6px;border-radius:4px;font-size:11px;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.15);white-space:nowrap}
</style>
{% endblock %}
{% block body %}
<div class="p-4 space-y-4">
<h1 class="text-lg font-bold">路线地图</h1>

<div id="route-map" class="w-full h-80 rounded-lg shadow-sm"></div>

<div class="bg-white rounded-lg p-3 shadow-sm prose prose-sm max-w-none">
{{ route | safe }}
</div>
</div>

<script>
window._AMapSecurityConfig = {securityJsCode:'{{ amap_security }}'};
AMapLoader.load({key:'{{ amap_key }}',version:'2.0',plugins:['AMap.Driving','AMap.Scale']}).then(function(AMap){
var map = new AMap.Map('route-map',{
  zoom:6, center:[100.5,26],
  features:['bg','road','building','point'],
  resizeEnable:true
});
map.addControl(new AMap.Scale());

var points = [{% for c in coords %}[{{c[0]}},{{c[1]}}],{% endfor %}];
var labels = [{% for s in stages %}'{{s[1]}}',{% endfor %}];

points.forEach(function(p,i){
  if(i>=labels.length) return;
  var marker = new AMap.Marker({
    position:p,
    content:'<div class="stage-marker">'+(i+1)+'</div>',
    offset:new AMap.Pixel(-12,-12)
  });
  marker.setLabel({content:'<div class="stage-label">'+labels[i]+'</div>',direction:'top',offset:new AMap.Pixel(0,-4)});
  map.add(marker);
});

var driving = new AMap.Driving({map:null,policy:AMap.DrivingPolicy.LEAST_DISTANCE});
var colors = ['#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#ef4444','#f59e0b','#10b981','#14b8a6','#06b6d4'];
(function drawSeg(i){
  if(i>=points.length-1){map.setFitView(null,false,[60,60,60,60]);return;}
  driving.search(new AMap.LngLat(points[i][0],points[i][1]),new AMap.LngLat(points[i+1][0],points[i+1][1]),function(s,r){
    if(s==='complete'&&r.routes&&r.routes.length){
      var path=r.routes[0].steps.reduce(function(a,st){return a.concat(st.path);},[]);
      map.add(new AMap.Polyline({path:path,strokeColor:colors[i%colors.length],strokeWeight:4,strokeOpacity:0.8,lineJoin:'round',lineCap:'round'}));
    } else {
      map.add(new AMap.Polyline({path:[points[i],points[i+1]],strokeColor:colors[i%colors.length],strokeWeight:3,strokeStyle:'dashed'}));
    }
    drawSeg(i+1);
  });
})(0);
}).catch(function(e){document.getElementById('route-map').innerHTML='<p class="text-gray-400 text-center pt-24">地图加载失败</p>';});
</script>
{% endblock %}
